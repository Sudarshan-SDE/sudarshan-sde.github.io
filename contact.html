<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sudarshan Sharma - Full Stack .NET Developer</title>
    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <!-- Header Section -->
    <div id="header"></div>

    <!-- Contact Info Section -->
    <section id="contact" class="py-5">
        <div class="container contact">
    
            <div class="text-center mb-2">
                <h3 class="section-title">
                    Contact <span class="highlight-name">Info</span>
                </h3>
            </div>
    
            <div class="row justify-content-center g-4">
    
                <!-- Email -->
                <div class="col-md-4">
                    <div class="contact-item">
                        <div class="icon">
                            <a href="mailto:sudarshans2k21@gmail.com">
                                <img src="./img/gmail_2.png" alt="gmail icon" class="img-fluid">
                            </a>
                        </div>
                        <p>Gmail</p>
                    </div> 
                </div>

                <!-- Phone -->
                <div class="col-md-4">
                    <div class="contact-item">
                        <div class="icon">
                            <a class="contact-card" href="tel:+919870844631">
                                <img src="./img/phone.png" alt="phone icon" class="img-fluid">
                            </a>
                        </div>
                        <p>Phone</p>
                    </div>
                </div>

    
                <!-- whatsapp -->
                <div class="col-md-4">
                    <div class="contact-item">
                        <div class="icon">
                            <a class="contact-card" href="https://wa.me/919870844631" target="_blank">
                                <img src="./img/whatsapp.png" alt="whatsapp" class="img-fluid">
                            </a>
                        </div>
                        <p>Whatsapp</p>
                    </div>
                </div>

                 <!-- Linkedin -->
                <div class="col-md-4">
                    <div class="contact-item">
                        <div class="icon">
                            <a href="https://www.linkedin.com/in/sudarshan-sharma-sde/" target="_blank" class="text-dark text-decoration-none">
                                <img src="./img/linkedin.png" alt="linkedin" class="img-fluid">       
                            </a>
                        </div>
                         <p>LinkedIn</p>
                    </div>
                </div>


                 <!-- Location -->
                <div class="col-md-4">
                    <div class="contact-item">
                        <div class="icon">
                            <img src="./img/location.png" alt="location icon" class="img-fluid">
                        </div>
                        <p>Location</p>
                    </div>
                </div>
    
            </div>
        </div>
    </section>

    <!-- Contact me Section -->
    <section id="contact" class="contact-section py-5">
      <div class="container">
        <div class="text-center mb-2">
          <h3 class="section-title">
            Contact <span class="highlight-name">Me</span>
          </h3>
        </div>

        <div class="row justify-content-center">
          <div class="col-md-8">
            <form id="contactForm">
              <!-- Name -->
              <div class="mb-3">
                <label for="name" class="form-label fw-bold">Name</label>
                <input
                  type="text"
                  id="name"
                  name="Name"
                  class="form-control"
                  placeholder="Your Name"
                  required
                />
              </div>

              <!-- Email -->
              <div class="mb-3">
                <label for="email" class="form-label fw-bold">Email</label>
                <input
                  type="email"
                  id="email"
                  name="Email"
                  class="form-control"
                  placeholder="Your Email"
                  required
                />
              </div>

              <!-- Message -->
              <div class="mb-3">
                <label for="message" class="form-label fw-bold">Message</label>
                <textarea
                  id="message"
                  name="Message"
                  class="form-control"
                  rows="5"
                  placeholder="Your Message"
                  required
                ></textarea>
              </div>

              <!-- Submit -->
              <div class="text-center">
                <button type="submit" class="btn btn-sm btn-primary">
                  Send Message
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer Section -->
    <div id="footer"></div>

    <script src="./js/cursor.js"></script>
    <script src="./js/script.js"></script>
</body>

</html>
